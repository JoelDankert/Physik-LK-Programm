<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="format-detection" content="telephone=no, date=no, address=no, email=no" />
    <title>Physik Quiz</title>
    <link rel="stylesheet" href="./styles.css" />
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [["$", "$"], ["\\(", "\\)"]],
          displayMath: [["$$", "$$"], ["\\[", "\\]"]]
        },
        svg: {
          fontCache: "global"
        }
      };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="scoreboard" aria-label="Punktestand">
        <div class="team-card team-card-left">
          <button class="team-label team-edit-button" id="team-0-name" type="button" data-edit="team-0-name">Team 1</button>
          <button class="team-score team-edit-button" id="team-0-score" type="button" data-edit="team-0-score">0</button>
        </div>
        <button class="quiz-title" type="button" id="reset-orb" aria-label="Spiel zurücksetzen">
          <span>Physik Quiz</span>
        </button>
        <div class="team-card team-card-right">
          <button class="team-label team-edit-button" id="team-1-name" type="button" data-edit="team-1-name">Team 2</button>
          <button class="team-score team-edit-button" id="team-1-score" type="button" data-edit="team-1-score">0</button>
        </div>
      </header>

      <main class="board-wrap">
        <section class="board" id="board" aria-label="Quizfeld"></section>
      </main>
    </div>

    <div class="overlay hidden" id="question-overlay" aria-hidden="true">
      <article class="question-modal">
        <button class="close-button" type="button" id="question-close" aria-label="Schließen">×</button>
        <div class="question-kicker" id="question-category"></div>
        <h1 class="question-text" id="question-text"></h1>
        <div class="question-image-wrap hidden" id="question-image-wrap">
          <img class="question-image" id="question-image" alt="" />
        </div>
        <div class="choices-grid" id="question-choices"></div>
        <button class="primary-button" type="button" id="show-answer">Antwort anzeigen</button>
        <section class="answer-panel hidden" id="answer-panel">
          <div class="answer-kicker">Antwort</div>
          <div class="answer-text" id="answer-text"></div>
          <div class="result-actions">
            <button class="result-button" type="button" data-result="0" id="award-team-0">Team 1</button>
            <button class="result-button neutral" type="button" data-result="none">Keiner</button>
            <button class="result-button" type="button" data-result="1" id="award-team-1">Team 2</button>
          </div>
        </section>
      </article>
    </div>

    <div class="overlay hidden" id="editor-overlay" aria-hidden="true">
      <article class="editor-modal">
        <button class="close-button" type="button" id="editor-close" aria-label="Schließen">×</button>
        <div class="editor-kicker" id="editor-kicker"></div>
        <input class="editor-input" id="editor-input" />
        <div class="editor-actions">
          <button class="quiet-button" type="button" id="editor-clear">Löschen</button>
          <button class="primary-button" type="button" id="editor-save">Speichern</button>
        </div>
      </article>
    </div>

    <div class="overlay hidden" id="menu-overlay" aria-hidden="true">
      <article class="editor-modal menu-modal">
        <button class="close-button" type="button" id="menu-close" aria-label="Schließen">×</button>
        <div class="editor-kicker">Physik Quiz</div>
        <div class="menu-actions">
          <button class="quiet-button" type="button" id="menu-reset">Reset</button>
          <button class="primary-button" type="button" id="menu-finish">Siegerehrung</button>
        </div>
      </article>
    </div>

    <div class="overlay hidden" id="finish-overlay" aria-hidden="true">
      <article class="finish-modal">
        <button class="close-button" type="button" id="finish-close" aria-label="Schließen">×</button>
        <div class="editor-kicker">Siegerehrung</div>
        <div class="finish-grid" id="finish-grid">
          <section class="finish-team" id="finish-team-0">
            <div class="finish-name" id="finish-name-0">Team 1</div>
            <div class="finish-score" id="finish-score-0">0</div>
          </section>
          <section class="finish-team" id="finish-team-1">
            <div class="finish-name" id="finish-name-1">Team 2</div>
            <div class="finish-score" id="finish-score-1">0</div>
          </section>
        </div>
      </article>
    </div>

    <div class="image-lightbox hidden" id="image-lightbox" aria-hidden="true">
      <button class="close-button lightbox-close" type="button" id="image-lightbox-close" aria-label="Schließen">×</button>
      <img class="lightbox-image" id="image-lightbox-image" alt="" />
    </div>

    <canvas class="party-stream hidden" id="party-stream" aria-hidden="true"></canvas>

    <script src="./app.js"></script>
  </body>
</html>
